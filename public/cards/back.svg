<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" aria-hidden="true">
  <defs>
    <linearGradient id="bgGrad" x1="0" x2="1">
    <text x="200" y="120">✠</text>
    <text x="200" y="160">Medieval</text>
    <text x="200" y="190">Tarot</text>
  </g>
  <g stroke="#5b3a29" stroke-width="4" fill="none">
    <path d="M60 480 C140 360 260 360 340 480" stroke-linecap="round"/>
    <path d="M100 420 L300 420" stroke-linecap="round"/>
  </g>
  </defs>
  <!-- Background parchment -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" rx="12"/>

  <!-- Decorative border -->
  <g stroke="#5b3a29" stroke-width="6" fill="none">
    <rect x="8" y="8" width="384" height="584" rx="10"/>
  </g>

  <!-- Rotating medallion -->
  <g transform="translate(200,170)">
    <g id="medallion" filter="url(#glow)">
      <circle r="60" fill="#5b3a29" opacity="0.95"/>
      <g fill="#efe6d6" transform="translate(-30,-30) scale(0.9)">
        <use href="#ornament" />
      </g>
      <text x="0" y="6" text-anchor="middle" font-family="serif" font-size="22" fill="#efe6d6">✠</text>
    </g>
    <animateTransform xlink:href="#medallion" attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="18s" repeatCount="indefinite"/>
  </g>

  <!-- Twinkling stars -->
  <g id="stars" fill="#f6e7c9">
    <circle cx="60" cy="80" r="2">
      <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite" begin="0s"/>
    </circle>
    <circle cx="340" cy="90" r="1.6">
      <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite" begin="0.6s"/>
    </circle>
    <circle cx="100" cy="260" r="1.8">
      <animate attributeName="opacity" values="0;1;0" dur="3.6s" repeatCount="indefinite" begin="0.3s"/>
    </circle>
    <circle cx="310" cy="260" r="1.4">
      <animate attributeName="opacity" values="0;1;0" dur="2.8s" repeatCount="indefinite" begin="0.9s"/>
    </circle>
  </g>

  <!-- Bottom flourish -->
  <g transform="translate(200,480)" fill="#5b3a29" opacity="0.9">
    <path d="M-120 0 C-60 -30 60 -30 120 0" stroke="#5b3a29" stroke-width="4" fill="none" stroke-linecap="round"/>
    <g transform="translate(-40,-10)">
      <use href="#ornament"/>
    </g>
    <g transform="translate(40,-10) scale(-1,1)">
      <use href="#ornament"/>
    </g>
  </g>

  <!-- subtle parchment texture overlay -->
  <g opacity="0.06" fill="#000">
    <rect x="0" y="0" width="400" height="600"/>
  </g>

</svg>
</svg>